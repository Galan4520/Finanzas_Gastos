<!DOCTYPE html>
<html>
<head>
    <title>Test API Scan</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .log { padding: 10px; margin: 5px 0; background: #2a2a2a; border-left: 3px solid #00ff00; }
        .error { border-left-color: #ff0000; color: #ff5555; }
        .success { border-left-color: #00ff00; }
        button { padding: 10px 20px; margin: 10px 5px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔬 Diagnóstico API /api/scan</h1>
    <button onclick="testAPI()">Test 1: OPTIONS request</button>
    <button onclick="testPOST()">Test 2: POST con imagen fake</button>
    <button onclick="testFromFrontend()">Test 3: POST desde tu dominio</button>
    <button onclick="clearLogs()">Limpiar</button>
    <div id="logs"></div>

    <script>
        const log = (msg, type = 'log') => {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('logs').prepend(div);
        };

        const clearLogs = () => {
            document.getElementById('logs').innerHTML = '';
        };

        async function testAPI() {
            log('🔄 Testing OPTIONS /api/scan...');
            try {
                const res = await fetch('https://finanzas-gastos.vercel.app/api/scan', {
                    method: 'OPTIONS'
                });
                log(`✅ OPTIONS response: ${res.status} ${res.statusText}`, 'success');
            } catch (err) {
                log(`❌ OPTIONS failed: ${err.message}`, 'error');
            }
        }

        async function testPOST() {
            log('🔄 Testing POST /api/scan con imagen fake...');
            try {
                const res = await fetch('https://finanzas-gastos.vercel.app/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: 'fake-base64-data' })
                });
                const data = await res.json();
                log(`Response ${res.status}: ${JSON.stringify(data)}`, res.ok ? 'success' : 'error');
            } catch (err) {
                log(`❌ POST failed: ${err.message}`, 'error');
            }
        }

        async function testFromFrontend() {
            log('🔄 Testing POST /api/scan (relative path)...');
            try {
                const res = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: 'test' })
                });
                const contentType = res.headers.get('content-type');
                log(`Response ${res.status}, Content-Type: ${contentType}`);

                if (contentType?.includes('application/json')) {
                    const data = await res.json();
                    log(`✅ JSON Response: ${JSON.stringify(data)}`, 'success');
                } else {
                    const text = await res.text();
                    log(`❌ HTML Response (404 redirect?): ${text.substring(0, 200)}...`, 'error');
                }
            } catch (err) {
                log(`❌ Fetch failed: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
